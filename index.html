<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b53d0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Le Parcours 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* Tricolore — bleu blanc rouge, lumineux et aéré */
  --bg1:#eef4ff; --bg2:#f7faff; --card:#ffffff; --card2:#f4f8ff; --raise:#eaf1ff;
  --line:#e6eefb; --line2:#d4e1f6;
  --ink:#10213f; --mut:#5d6f8e; --dim:#9fb1cb;
  --blue:#0b53d0; --blue2:#0a40a8; --blueSoft:#e7f0ff;
  --red:#ee3a43; --red2:#d62832; --redSoft:#ffe9ea;
  --green:#16a85c; --greenD:#0f8a49;
  --gold:#f4b400; --goldD:#d99a00;
  --win:#0f9a52; --loss:#e2575f; --ball:#10213f;
  --frBlue:#0b4fd1; --frRed:#ef3340;
  --sh:0 10px 28px rgba(11,83,208,.10); --shHover:0 16px 36px rgba(11,83,208,.16);
  --gap:14px; --rad:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg2);color:var(--ink);
  font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(1300px 540px at 50% -14%, #d9e7ff 0%, transparent 60%),
    radial-gradient(760px 420px at 100% 0%, #ffe3e6 0%, transparent 56%),
    linear-gradient(180deg,var(--bg1),var(--bg2) 44%,#ffffff);
  background-attachment:fixed; min-height:100dvh; padding-bottom:104px;
}
.wrap{max-width:1040px;margin:0 auto;padding:0 18px}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-family:'JetBrains Mono',monospace}

/* ---- header ---- */
header{position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg, rgba(255,255,255,.97), rgba(255,255,255,.85) 74%, transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:max(12px,env(safe-area-inset-top)) 0 8px}
.bar{display:flex;align-items:center;gap:12px;padding:0 18px;max-width:1040px;margin:0 auto}
.brand{display:flex;flex-direction:column;line-height:.9}
.brand .k{font-family:'Anton';font-size:32px;letter-spacing:.5px;
  background:linear-gradient(95deg,var(--blue) 8%,#3b6fe0 48%,var(--red) 92%);
  -webkit-background-clip:text;background-clip:text;color:transparent}
.brand .s{font-size:11px;letter-spacing:2.8px;text-transform:uppercase;color:var(--mut);margin-top:4px;font-weight:700}
.brand .s b{color:var(--frBlue)}
.sync{margin-left:auto;display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,var(--blue),var(--blue2));color:#fff;
  padding:12px 17px;border-radius:15px;font-weight:800;font-size:13.5px;
  box-shadow:0 8px 20px rgba(11,83,208,.32)}
.sync:active{transform:scale(.95)}
.sync .dot{width:8px;height:8px;border-radius:50%;background:#bfe9ff;box-shadow:0 0 10px #7fd2ff}
.sync.spin .dot{animation:pulse .8s infinite}
@keyframes pulse{50%{opacity:.3;transform:scale(.55)}}

/* tabs — pleine largeur, colonnes égales */
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 18px 4px;max-width:1040px;margin:0 auto}
@media(min-width:720px){.tabs{grid-template-columns:repeat(6,1fr)}}
.tab{white-space:normal;line-height:1.04;min-height:46px;display:flex;align-items:center;justify-content:center;
  padding:8px 5px;border-radius:14px;font-weight:800;font-size:13.5px;color:var(--mut);
  background:#fff;border:1.5px solid var(--line);text-align:center;box-shadow:0 4px 12px rgba(11,83,208,.05)}
.tab.on{color:#fff;background:linear-gradient(180deg,var(--blue),var(--blue2));border-color:transparent;
  box-shadow:0 8px 18px rgba(11,83,208,.28)}

/* generic */
.view{padding-top:18px;animation:fade .28s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}}
.eyebrow{font-size:12px;letter-spacing:1.8px;text-transform:uppercase;color:var(--blue2);font-weight:800;margin:24px 4px 12px}
.eyebrow:first-child{margin-top:4px}
.eyebrow.red{color:var(--red2)}

/* ---- FRANCE HERO ---- */
.frhero{margin:2px 0 20px;border-radius:24px;padding:4px;
  background:linear-gradient(110deg,var(--frBlue) 0 33%,#fff 33% 67%,var(--frRed) 67%);
  box-shadow:0 16px 36px rgba(11,79,209,.26)}
.frhero-in{background:linear-gradient(155deg,#0c2f7a,#11409a 55%,#0d2f78);border-radius:21px;
  padding:18px 20px;color:#fff;position:relative;overflow:hidden}
.frhero-in::after{content:'🇫🇷';position:absolute;right:-8px;bottom:-18px;font-size:92px;opacity:.15;transform:rotate(-8deg)}
.fh-lbl{font-size:11.5px;letter-spacing:1.8px;text-transform:uppercase;font-weight:800;color:#bcd2ff}
.fh-match{display:flex;align-items:center;gap:11px;margin:8px 0 5px;font-family:'Anton';font-size:26px;letter-spacing:.5px}
.fh-vs{color:#fff} .fh-x{color:#9fc0ff;font-size:17px} .fh-op{color:#ffd9dd}
.fh-meta{font-size:13px;color:#cdddff;font-weight:600}
.fh-cd{display:inline-block;margin-left:5px;background:var(--gold);color:#3a2600;font-family:'JetBrains Mono';
  font-weight:800;padding:2px 9px;border-radius:8px;font-size:12.5px;letter-spacing:.5px}
.fh-btn{margin-top:13px;background:#fff;color:var(--frBlue);font-weight:800;font-size:14px;
  padding:11px 18px;border-radius:13px;box-shadow:0 6px 16px rgba(0,0,0,.18)}
.fh-btn:active{transform:scale(.96)}
.fh-allez{margin-top:12px;font-family:'Anton';font-size:15px;letter-spacing:2px;color:#fff;opacity:.92}

/* chips — pleine largeur, égales, repli mobile */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:2px 0 8px}
.chip{flex:1 1 0;min-width:62px;text-align:center;white-space:nowrap;padding:9px 6px;border-radius:13px;
  font-weight:800;font-size:13px;color:var(--mut);background:#fff;border:1.5px solid var(--line)}
.chip.on{color:#fff;background:linear-gradient(180deg,var(--blue),var(--blue2));border-color:transparent;
  box-shadow:0 6px 14px rgba(11,83,208,.26)}

/* ---- responsive grids (iPad multi-colonnes) ---- */
.cards{display:grid;grid-template-columns:1fr;gap:12px;align-items:start}
.tbl-grid{display:grid;grid-template-columns:1fr;gap:14px}
.sco-grid{display:grid;grid-template-columns:1fr;gap:9px}
@media(min-width:720px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .tbl-grid{grid-template-columns:repeat(2,1fr)}
  .sco-grid{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:repeat(4,1fr)!important}
}
@media(min-width:1000px){
  .cards{grid-template-columns:repeat(3,1fr)}
}

/* ---- match card (compacte, hauteur = contenu) ---- */
.match{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:12px 14px;
  box-shadow:var(--sh);display:flex;flex-direction:column;gap:2px}
.match:active{transform:scale(.99)}
.match.fr{border-color:var(--frBlue);box-shadow:0 12px 26px rgba(11,79,209,.16)}
.match.done{border-color:#dceee2}
.m-top{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--dim);font-weight:800;
  letter-spacing:.3px;text-transform:uppercase;margin-bottom:6px}
.m-badge{padding:3px 9px;border-radius:8px;background:var(--blueSoft);color:var(--blue2);font-weight:800}
.m-badge.k{color:#fff;background:linear-gradient(180deg,var(--red),var(--red2))}
.m-when{margin-left:auto;text-transform:none;letter-spacing:0;color:var(--mut);font-weight:700}
.trow{display:flex;align-items:center;gap:10px;padding:4px 0}
.trow .fl{font-size:23px;width:28px;text-align:center;flex:none}
.trow .tn{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.trow .sc{font-family:'JetBrains Mono';font-weight:800;font-size:23px;color:var(--ink);flex:none;min-width:22px;text-align:right}
.trow .sc.dash{color:var(--dim);font-size:18px;padding:0}
.trow.win .tn{font-weight:800;color:var(--ink)} .trow.win .sc{color:var(--green)}
.trow.lose .tn{color:var(--dim)} .trow.lose .sc{color:var(--dim)}
.trow.fr .tn{color:var(--frBlue);font-weight:800}
.trow.fr .fl{filter:drop-shadow(0 0 6px rgba(11,79,209,.4))}
.trow .ph{color:var(--dim);font-style:italic;font-weight:600;font-size:14px}
.frstar{color:var(--gold);font-size:13px;margin-left:1px;flex:none}
.m-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px;padding-top:8px;border-top:1px dashed var(--line2)}
.m-status{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:6px}
.m-status.tbd{background:var(--blueSoft);color:var(--blue2)} .m-status.fin{background:#e3f5ea;color:var(--greenD)}
.m-pen{font-size:10px;color:var(--goldD);font-weight:800}
.m-sc{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--mut);font-weight:600}
.m-sc .b{color:var(--ink);font-weight:700}
.m-sc .mn{color:var(--dim);font-family:'JetBrains Mono';font-size:10.5px}

/* standings */
.tbl{background:var(--card);border:1.5px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--sh)}
.tbl h3{margin:0;padding:12px 15px;font-family:'Anton';font-size:17px;letter-spacing:.5px;color:#fff;
  background:linear-gradient(100deg,var(--blue),#3a6fe0);display:flex;align-items:center;gap:9px}
.tbl h3 .gl{width:27px;height:27px;border-radius:9px;display:grid;place-items:center;background:rgba(255,255,255,.22);
  font-size:14px;color:#fff;font-family:'Anton'}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);font-weight:800;padding:9px 4px;text-align:center;background:var(--card2)}
th.l,td.l{text-align:left;padding-left:12px}
td{padding:10px 4px;text-align:center;border-top:1px solid var(--line);font-weight:700}
td.pts{font-family:'JetBrains Mono';font-weight:800;color:var(--ink)}
.pos{display:inline-block;width:17px;font-weight:800;color:var(--dim)}
tr.q1 .pos,tr.q2 .pos{color:var(--greenD)}
tr.q1{background:linear-gradient(90deg,rgba(22,168,92,.16),transparent)}
tr.q2{background:linear-gradient(90deg,rgba(22,168,92,.08),transparent)}
tr.q3{background:linear-gradient(90deg,rgba(244,180,0,.14),transparent)}
.qbar{width:4px;padding:0}
tr.q1 td.qbar{background:var(--green)} tr.q2 td.qbar{background:rgba(22,168,92,.55)} tr.q3 td.qbar{background:var(--gold)}
.tname{font-weight:800}
tr.fr{background:linear-gradient(90deg,rgba(11,79,209,.13),rgba(239,51,64,.06))!important}
tr.fr .tname{color:var(--frBlue)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin:2px 4px 16px;font-weight:600}
.legend i{width:11px;height:11px;border-radius:4px;display:inline-block;margin-right:6px;vertical-align:middle}

/* thirds */
.thirds{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:4px 0;margin-bottom:16px;box-shadow:var(--sh)}
.third-row{display:flex;align-items:center;gap:10px;padding:10px 15px;font-size:13.5px;border-top:1px solid var(--line);font-weight:700}
.third-row:first-child{border-top:none}
.third-row.q{background:linear-gradient(90deg,rgba(22,168,92,.12),transparent)}
.third-row .r{width:18px;font-weight:800;color:var(--dim);font-family:'JetBrains Mono'}
.third-row.q .r{color:var(--greenD)}
.third-row.fr{background:linear-gradient(90deg,rgba(11,79,209,.13),transparent)}
.third-row.fr .tname{color:var(--frBlue)}
.third-row .gp{margin-left:auto;font-size:10px;color:var(--dim);font-weight:800}
.third-row .mini{font-family:'JetBrains Mono';font-size:11px;color:var(--mut)}

/* bracket */
.bracket{overflow-x:auto;padding:4px 0 12px;scrollbar-width:thin}
.cols{display:flex;gap:16px;min-width:max-content;padding:0 2px}
.col{display:flex;flex-direction:column;gap:11px;min-width:188px}
.col-h{font-family:'Anton';font-size:15px;letter-spacing:1px;color:var(--blue2);text-transform:uppercase;padding:2px 0 4px}
.km{background:var(--card);border:1.5px solid var(--line);border-radius:15px;padding:11px 12px;font-size:13px;box-shadow:0 6px 16px rgba(11,83,208,.07)}
.km.live{border-color:var(--blue)}
.km.done{border-color:var(--green)}
.km .kn{font-size:9px;color:var(--dim);font-weight:800;letter-spacing:.5px;margin-bottom:7px;display:flex;justify-content:space-between}
.kside{display:flex;align-items:center;gap:7px;padding:3px 0}
.kside .kf{width:21px;font-size:17px;text-align:center}
.kside .ktn{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.kside.win .ktn{color:var(--greenD);font-weight:800}
.kside.lose .ktn{color:var(--dim)}
.kside .ks{font-family:'JetBrains Mono';font-weight:800;font-size:15px;color:var(--ink)}
.kside .ph2{color:var(--dim);font-weight:600;font-style:italic;font-size:12px}
.kside.fr .ktn{color:var(--frBlue);font-weight:800}
.km.final{border-color:var(--gold);background:linear-gradient(160deg,#fff8e6,#fff)}
.champ{margin-top:8px;background:linear-gradient(160deg,#fff3cf,#ffe39a);
  border:2px solid var(--gold);border-radius:17px;padding:16px;text-align:center;box-shadow:0 12px 26px rgba(244,180,0,.28)}
.champ .lbl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--goldD);font-weight:800}
.champ .nm{font-family:'Anton';font-size:28px;margin-top:6px;color:#6a4a00}

/* scorers */
.scorer{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);
  border-radius:16px;padding:12px 15px;box-shadow:var(--sh)}
.scorer .rk{font-family:'Anton';font-size:22px;width:30px;color:var(--dim);text-align:center}
.scorer.top1{background:linear-gradient(100deg,#fff7df,#fff)}
.scorer.top1 .rk{color:var(--goldD)} .scorer.top2 .rk{color:#8aa0b8} .scorer.top3 .rk{color:#c97b3c}
.scorer.fr{background:linear-gradient(100deg,rgba(11,79,209,.08),#fff)}
.scorer .pn{font-weight:800;font-size:15px}
.scorer .pt{font-size:11.5px;color:var(--mut);font-weight:600}
.scorer .gl{margin-left:auto;display:flex;align-items:center;gap:6px}
.scorer .gn{font-family:'JetBrains Mono';font-weight:800;font-size:22px;color:var(--blue2)}
.boot{font-size:16px}

/* stats */
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
.stat{background:var(--card);border:1.5px solid var(--line);border-radius:17px;padding:15px;box-shadow:var(--sh)}
.stat .v{font-family:'Anton';font-size:33px;line-height:1;background:linear-gradient(95deg,var(--blue),var(--red));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.stat .l{font-size:12px;color:var(--mut);margin-top:6px;font-weight:700}
.stat.wide{grid-column:1/-1;display:flex;align-items:center;gap:14px}
.stat.wide .big{font-size:32px} .stat.wide .v{font-size:23px}

/* empty / banners */
.empty{text-align:center;padding:40px 18px;color:var(--mut)}
.empty .ic{font-size:42px;margin-bottom:12px}
.empty b{color:var(--ink);display:block;margin-bottom:6px;font-size:16px}
.banner{display:flex;gap:11px;align-items:flex-start;background:linear-gradient(120deg,var(--blueSoft),#fff);
  border:1.5px solid var(--line);border-radius:16px;padding:13px 16px;margin-bottom:16px;font-size:13px;color:var(--mut);line-height:1.5;font-weight:600}
.banner b{color:var(--ink)}

/* modal */
.scrim{position:fixed;inset:0;z-index:80;background:rgba(11,33,63,.42);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:600px;background:var(--bg2);border:none;
  border-radius:28px 28px 0 0;padding:18px 18px max(22px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1);max-height:90dvh;overflow-y:auto;box-shadow:0 -12px 44px rgba(11,33,63,.24)}
@media(min-width:720px){.scrim{align-items:center}.sheet{border-radius:28px;max-width:560px}}
.scrim.on .sheet{transform:translateY(0)}
.grab{width:44px;height:5px;border-radius:3px;background:var(--line2);margin:0 auto 16px}
.sheet .sh-when{text-align:center;font-size:11.5px;color:var(--blue2);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:800}
.entry{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:6px}
.eteam{flex:1;text-align:center}
.eteam .ef{font-size:40px} .eteam .en{font-weight:800;font-size:13.5px;margin-top:4px}
.stepper{display:flex;align-items:center;background:#fff;border:1.5px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:var(--sh)}
.stepper button{width:42px;height:52px;font-size:25px;font-weight:800;color:var(--blue)}
.stepper button:active{background:var(--raise)}
.stepper .num{width:46px;text-align:center;font-family:'JetBrains Mono';font-weight:800;font-size:28px}
.vs{color:var(--dim);font-weight:800;font-size:13px}
.penbox{margin:14px 0 4px;padding:13px;background:linear-gradient(120deg,#fff7e6,#fff);border:1.5px solid #ffe1a3;border-radius:14px}
.penbox .pt{font-size:11.5px;color:var(--goldD);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.penopts{display:flex;gap:9px}
.penopts button{flex:1;padding:11px;border-radius:12px;background:#fff;border:1.5px solid var(--line);font-weight:800;font-size:13px}
.penopts button.on{background:linear-gradient(180deg,var(--gold),var(--goldD));color:#3a2600;border-color:transparent}
.sec-t{font-size:11.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--blue2);font-weight:800;margin:18px 2px 10px}
.sclist{display:flex;flex-direction:column;gap:7px}
.scrow{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:8px 11px}
.scrow .who{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scrow .tm{font-size:16px}
.scrow .scmin{font-size:10.5px;color:var(--mut);font-weight:800;font-family:'JetBrains Mono'}
.scrow .del{color:var(--loss);font-weight:800;font-size:17px;padding:0 4px}
.addsc{display:flex;gap:7px;margin-top:9px;align-items:stretch}
.addsc2{display:flex;gap:7px;margin-top:7px;align-items:stretch}
.scfield{position:relative;flex:1;min-width:0}
.scfield>input{width:100%}
.addsc input,.addsc2 input{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px;color:var(--ink);font-size:13.5px;font-family:inherit}
.scmininput{width:72px;flex:none;text-align:center;font-family:'JetBrains Mono';font-weight:700}
.addsc2 select{flex:1;min-width:0;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;color:var(--ink);font-size:13.5px;font-weight:700}
.addbtn{background:linear-gradient(180deg,var(--blue),var(--blue2));color:#fff;border-radius:12px;padding:0 20px;font-weight:800;font-size:14px;flex:none;box-shadow:0 6px 14px rgba(11,83,208,.26)}
.scsug{position:absolute;left:0;right:0;bottom:calc(100% + 6px);background:#fff;border:1.5px solid var(--line2);
  border-radius:14px;box-shadow:0 -10px 28px rgba(11,33,63,.18);max-height:252px;overflow-y:auto;z-index:6;display:none}
.scsug.on{display:block}
.scsug button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:12px 14px;background:#fff;
  font-size:14px;font-weight:700;color:var(--ink);border-bottom:1px solid var(--line)}
.scsug button:first-child{background:linear-gradient(100deg,var(--blueSoft),#fff)}
.scsug button:last-child{border-bottom:none}
.scsug button:active{background:var(--raise)}
.scsug .sf{font-size:19px;flex:none}
.scsug .snm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scsug .stm{font-size:10.5px;color:var(--mut);font-weight:700;flex:none}
.sheet-actions{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:15px;border-radius:15px;font-weight:800;font-size:14.5px;text-align:center}
.btn.primary{background:linear-gradient(180deg,var(--blue),var(--blue2));color:#fff;box-shadow:0 8px 20px rgba(11,83,208,.32)}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--mut)}
.btn.danger{background:#fff;border:1.5px solid rgba(226,87,95,.35);color:var(--loss);flex:none;padding:15px 17px}

/* toast */
.toast{position:fixed;left:50%;bottom:116px;transform:translateX(-50%) translateY(20px);z-index:90;
  background:linear-gradient(180deg,var(--blue),var(--blue2));border:none;color:#fff;padding:13px 19px;border-radius:15px;
  font-weight:800;font-size:14px;box-shadow:0 10px 28px rgba(11,83,208,.4);opacity:0;pointer-events:none;transition:.25s;max-width:90%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* footer tools */
.tools{display:flex;gap:9px;margin:24px 2px 8px}
.tools button{flex:1;padding:13px;border-radius:14px;background:#fff;border:1.5px solid var(--line);font-weight:800;font-size:12.5px;color:var(--mut)}
.foot{text-align:center;font-size:11px;color:var(--dim);padding:16px 2px 4px;line-height:1.7;font-weight:600}

/* points pill + coq mascot */

.coq{display:flex;align-items:center;gap:10px;margin-top:14px;position:relative;z-index:2}
.coq-emo{font-size:38px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.25));animation:coqBob 2.4s ease-in-out infinite;flex:none}

.coq-bubble{position:relative;background:#fff;color:#0c2f7a;font-weight:800;font-size:13px;line-height:1.25;
  padding:10px 13px;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.2);flex:1}
.coq-bubble::before{content:'';position:absolute;left:-7px;top:50%;transform:translateY(-50%);
  border:7px solid transparent;border-right-color:#fff}

/* pronostic block */
.prono{background:linear-gradient(135deg,#efe6ff,#e7f0ff);border:2px solid #cdb8ff;border-radius:18px;padding:14px;margin-bottom:4px}

.prono-row{display:flex;align-items:center;justify-content:center;gap:10px}
.prono-row .pf{font-size:26px}
.prono-row .px{font-weight:800;color:#8a6fd4;font-size:18px}
.ministep{display:flex;align-items:center;background:#fff;border:1.5px solid #cdb8ff;border-radius:12px;overflow:hidden}
.ministep button{width:34px;height:44px;font-size:21px;font-weight:800;color:#6b3fd4}
.ministep button:active{background:#f0e9ff}
.ministep .pn{width:34px;text-align:center;font-family:'JetBrains Mono';font-weight:800;font-size:22px;color:#3a1f7a}
.prono-save{width:100%;margin-top:12px;background:linear-gradient(180deg,#7c4dff,#6b3fd4);color:#fff;font-weight:800;font-size:14px;padding:12px;border-radius:13px;box-shadow:0 6px 16px rgba(124,77,255,.35)}
.prono-save:active{transform:scale(.97)}
.prono-hint{text-align:center;font-size:11px;color:#7a6aa0;margin-top:8px;font-weight:600}
.prono-hint b{color:#6b3fd4}
.prono.done{text-align:center;background:linear-gradient(135deg,#e3f5ea,#eafaf0);border-color:#a6e3c0}
.prono.done.lose{background:linear-gradient(135deg,#fdeef0,#fff4f5);border-color:#f3c2c8}
.prono.done .prono-h{color:#0f8a49;margin-bottom:4px}
.prono.done.lose .prono-h{color:#c0444d}
.prono-res{font-size:15px;font-weight:800;color:#0f8a49}
.prono.done.lose .prono-res{color:#c0444d}
.m-prono{font-size:10px;font-weight:800;padding:2px 8px;border-radius:7px;background:#efe6ff;color:#6b3fd4;letter-spacing:.3px}
.m-prono.good{background:#e3f5ea;color:var(--greenD)}
.m-prono.bad{background:#f3f5f9;color:var(--dim)}

/* badges / défis */
.badges{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px}

.badge{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center;box-shadow:var(--sh);opacity:.5;filter:grayscale(.75)}

.badge .be{font-size:30px;display:block;line-height:1}
.badge .bt{font-weight:800;font-size:12px;margin-top:7px;color:var(--ink)}
.badge .bd{font-size:10px;color:var(--mut);margin-top:3px;font-weight:600;line-height:1.3}
.badge.on .bd{color:var(--greenD)}
.stat.wide.pts .v{background:linear-gradient(95deg,var(--gold),var(--goldD));-webkit-background-clip:text;background-clip:text;color:transparent}

/* ===== JEUX ===== */
.fod{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,#fff7df,#fff);border:2px solid #f4d77a;
  border-radius:18px;padding:14px 16px;box-shadow:var(--sh);cursor:pointer}
.fod:active{transform:scale(.99)}
.fod-flag{font-size:42px;flex:none}
.fod-name{font-weight:800;font-size:17px;color:var(--ink)}
.fod-fact{font-size:12.5px;color:var(--mut);font-weight:600;margin-top:2px}
.fod-go{margin-left:auto;font-size:28px;color:var(--goldD);font-weight:800;flex:none}
.quiz-launch{display:flex;align-items:center;gap:13px;background:linear-gradient(120deg,#efe6ff,#e7f0ff);
  border:2px solid #cdb8ff;border-radius:18px;padding:14px 16px;box-shadow:var(--sh)}
.ql-emo{font-size:40px;flex:none}
.ql-t{font-weight:800;font-size:16px;color:#3a1f7a}
.ql-s{font-size:12px;color:#6b5a90;font-weight:600;margin-top:3px}
.ql-btn{margin-left:auto;background:linear-gradient(180deg,#7c4dff,#6b3fd4);color:#fff;font-weight:800;font-size:14px;
  padding:12px 22px;border-radius:13px;box-shadow:0 6px 16px rgba(124,77,255,.35);flex:none}
.ql-btn:active{transform:scale(.96)}
.factgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}

.factcell{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:14px;

.factcell:active{transform:scale(.97);background:var(--raise)}
.factcell.fr{border-color:var(--frBlue);background:linear-gradient(100deg,var(--blueSoft),#fff)}
.fc-fl{font-size:24px;flex:none}
.fc-nm{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.q-cap{font-size:30px;font-weight:800;color:var(--ink)}
.q-player{font-size:22px;font-weight:800;color:var(--ink);line-height:1.5}
.q-ask{font-size:14px;color:var(--mut);font-weight:700;margin-top:12px}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-opt{background:#fff;border:2px solid var(--line);border-radius:15px;padding:16px 12px;font-weight:800;font-size:15px;color:var(--ink);box-shadow:var(--sh);min-height:58px}
.q-opt.big{font-size:40px}
.q-opt:active{transform:scale(.97)}
.q-opt.good{background:linear-gradient(180deg,#1aa85c,#0f8a49);color:#fff;border-color:transparent}
.q-opt.bad{background:linear-gradient(180deg,#ef5560,#d62832);color:#fff;border-color:transparent}
.quiz-next{width:100%;margin-top:16px;background:linear-gradient(180deg,var(--blue),var(--blue2));color:#fff;font-weight:800;font-size:15px;padding:15px;border-radius:15px;box-shadow:0 8px 20px rgba(11,83,208,.32)}
.quiz-hint{text-align:center;font-size:12px;color:var(--dim);margin-top:14px;font-weight:600}
.quiz-end{text-align:center;background:#fff;border:2px solid var(--gold);border-radius:22px;padding:30px 20px;box-shadow:var(--sh);margin-top:10px}
.qe-emo{font-size:64px}

.qe-msg{font-weight:800;font-size:20px;color:var(--ink);margin-top:6px}
.qe-pts{color:var(--goldD);font-weight:800;font-size:15px;margin-top:10px}
.qe-best{color:var(--mut);font-size:12.5px;font-weight:600;margin-top:6px}
.qe-actions{display:flex;gap:10px;margin-top:20px}

.fact-flag{font-size:72px;line-height:1}
.fact-name{font-family:'Anton';font-size:30px;color:var(--ink);margin-top:6px}
.fact-nick{font-size:15px;color:var(--blue2);font-weight:800;font-style:italic;margin-top:2px}

.fact-row{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:0 4px 12px rgba(11,83,208,.05)}

.m-mom{font-size:10px;font-weight:800;padding:2px 8px;border-radius:7px;background:#fff7df;color:var(--goldD);letter-spacing:.3px;border:1px solid #f4d77a}

/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:200;display:none}
#confetti.on{display:block}
.cfp{position:absolute;width:11px;height:14px;border-radius:2px;will-change:transform,opacity;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.9}}

function standings(g){

    h.P++;a.P++;h.GF+=r.h;h.GA+=r.a;a.GF+=r.a;a.GA+=r.h;

/* assign 8 qualified thirds to third-slots respecting allowed group letters (backtracking) */
function thirdAssign(){
  if(!allGroupsDone())return null;

  const slots=DB.ko_fixtures.filter(m=>m.h[0]==='3'||m.a[0]==='3').map(m=>{
    const sl=m.h[0]==='3'?m.h:m.a; return {n:m.n, allow:sl[1]};});
  // bipartite matching slots<->qual group letters
  const res={};const used=new Set();
  function bt(i){
    if(i===slots.length)return true;
    const s=slots[i];
    for(const g of qual){ if(used.has(g))continue; if(s.allow.includes(g)){used.add(g);res[s.n]=g;if(bt(i+1))return true;used.delete(g);delete res[s.n];}}

  }

  slots.sort((a,b)=>a.allow.filter(g=>qual.includes(g)).length-b.allow.filter(g=>qual.includes(g)).length);

function slotLabel(slot,mn){

  if(k==='1')return 'Vainq. '+slot[1];
  if(k==='2')return '2e '+slot[1];
  if(k==='3')return '3e '+slot[1].join('/');
  if(k==='W')return 'Vainq. M'+slot[1];
  if(k==='L')return 'Perdant M'+slot[1];
  return '?';
}

const PH={R32:'32es de finale',R16:'8es de finale',QF:'Quarts',SF:'Demi-finales',P3:'3e place',F:'Finale'};
function franceHero(){
  const fm=ALLM.filter(m=>{
    if(!m.ko)return m.h==='FRA'||m.a==='FRA';
    const[H,A]=koTeams(m);return H==='FRA'||A==='FRA';
  });
  const today='2026-06-14';
  const upcoming=fm.filter(m=>!played(m.n)).sort((a,b)=>(a.date||'9').localeCompare(b.date||'9')||a.n-b.n);
  const last=fm.filter(m=>played(m.n)).sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.n-a.n)[0];
  let inner='',coqMsg="En route pour le Mondial, allez les Bleus !";
  const opp=(m)=>{let H,A;if(!m.ko){H=m.h;A=m.a;}else{[H,A]=koTeams(m);}const o=H==='FRA'?A:H;return o;};
  if(upcoming.length){
    const m=upcoming[0];const o=opp(m);
    const d=m.date?dateLabel(m.date,m.time):'date à venir';
    let cd='';
    if(m.date){const diff=Math.round((new Date(m.date)-new Date(today))/86400000);
      cd=diff>0?`J‑${diff}`:diff===0?"AUJOURD'HUI":'';}
    coqMsg=cd==="AUJOURD'HUI"?"C'est aujourd'hui ! Allez les Bleus ! 🔥":`Prochain défi : ${name(o)||'?'} ! On y croit 💪`;
    inner=`<div class="fh-lbl">Prochain match des Bleus</div>
      <div class="fh-match"><span class="fh-vs">🇫🇷 France</span><span class="fh-x">vs</span>
      <span class="fh-op">${fl(o)} ${name(o)||'?'}</span></div>
      <div class="fh-meta">${m.ko?PH[m.phase]:'Groupe I'} · ${d} ${cd?`<b class="fh-cd">${cd}</b>`:''}</div>
      <button class="fh-btn" onclick="openMatch(${m.n})">Pronostic / score ⚽</button>`;
  } else if(last){
    const m=last;const o=opp(m);const r=res(m.n);
    let H;if(!m.ko){H=m.h;}else{[H]=koTeams(m);}
    const fh=H==='FRA'?r.h:r.a, fa=H==='FRA'?r.a:r.h;
    const win=fh>fa,draw=fh===fa;
    const verdict=win?'Victoire ! 🎉':draw?'Match nul':'Défaite';
    coqMsg=win?'QUELLE VICTOIRE ! Cocorico ! 🐓🎉':draw?'Un point de pris, on continue !':'On se relève. Allez les Bleus ! 💙';
    inner=`<div class="fh-lbl">Dernier match des Bleus — ${verdict}</div>
      <div class="fh-match"><span class="fh-vs">🇫🇷 ${fh}</span><span class="fh-x">–</span><span class="fh-op">${fa} ${fl(o)}</span></div>
      <div class="fh-meta">${m.ko?PH[m.phase]:'Groupe I'} · ${name(o)}</div>`;
  } else {
    inner=`<div class="fh-lbl">En route pour le Mondial !</div>
      <div class="fh-match"><span class="fh-vs">🇫🇷 Allez les Bleus</span></div>`;
  }
  const pts=totalPoints();
  return `<div class="frhero"><div class="frhero-in">
    <div class="fh-pts">🏆 ${pts} pt${pts>1?'s':''}</div>
    ${inner}
    <div class="coq"><span class="coq-emo">🐓</span><span class="coq-bubble">${coqMsg}</span></div>
  </div></div>`;
}
function renderCal(){
  const filters=[['all','Tout'],['J1','J1'],['J2','J2'],['J3','J3'],['R32','32es'],['R16','8es'],['QF','Quarts'],['SF','Demies'],['F','Finale']];
  let h='<div class="view">'+franceHero()+'<div class="chips">'+filters.map(f=>
    `<button class="chip ${calFilter===f[0]?'on':''}" onclick="setCal('${f[0]}')">${f[1]}</button>`).join('')+'</div>';
  let ms=ALLM.filter(m=>{
    if(calFilter==='all')return true;
    if(calFilter[0]==='J')return !m.ko&&m.md===+calFilter[1];
    return m.ko&&m.phase===calFilter;
  });
  // sort: groups by md then n, ko by n
  ms.sort((a,b)=>(a.ko-b.ko)|| (a.date&&b.date? a.date.localeCompare(b.date):0) || a.n-b.n);
  if(calFilter==='all'){
    h+='<div class="eyebrow">⚽ Phase de groupes</div>';
    h+='<div class="cards">'+ms.filter(m=>!m.ko).map(matchCard).join('')+'</div>';
    h+='<div class="eyebrow red">🏆 Phase finale</div>';
    const ko=ms.filter(m=>m.ko);
    h+='<div class="cards">'+ko.map(matchCard).join('')+'</div>';
  } else {
    h+='<div class="cards">'+ms.map(matchCard).join('')+'</div>';
  }
  h+='</div>';
  app.innerHTML=h;
}
function setCal(f){calFilter=f;render();}
function matchCard(m){
  let H,A,phBadge;
  if(!m.ko){H=m.h;A=m.a;phBadge=`<span class="m-badge">Groupe ${m.grp} · J${m.md}</span>`;}
  else{const[h,a]=koTeams(m);H=h;A=a;phBadge=`<span class="m-badge k">${PH[m.phase]}</span>`;}
  const when=dateLabel(m.date,m.time);
  const r=res(m.n);const done=played(m.n);
  const hw=done&&r.h>r.a, aw=done&&r.a>r.h;
  const trow=(code,slot,win,lose,score)=>{
    const star=code==='FRA'?'<span class="frstar">★</span>':'';
    const teamHTML=code?`<span class="fl">${fl(code)}</span><span class="tn">${name(code)}</span>${star}`
                       :`<span class="fl">·</span><span class="tn ph">${slotLabel(slot,m.n)}</span>`;
    const sc=done?`<span class="sc">${score}</span>`:`<span class="sc dash">–</span>`;
    return `<div class="trow ${win?'win':''} ${lose?'lose':''}${frc(code)}">${teamHTML}${sc}</div>`;
  };
  // scorers footer
  const pr=predOf(m.n);
  let foot='';
  if(done){
    const sl=(r.scorers||[]).slice().sort((a,b)=>(parseInt(a.min)||0)-(parseInt(b.min)||0))
      .map(s=>`<span class="m-sc"><span class="b">${s.name.split(' ').slice(-1)[0]}</span>${s.min?`<span class="mn">${s.min}'${s.og?' csc':''}${s.pen?' sp':''}</span>`:''}</span>`).join('');
    let pchip='';
    if(pr){const pt=predPoints(m.n);
      pchip=`<span class="m-prono ${pt?'good':'bad'}">${pt===3?'🎯':pt===1?'👍':'✗'} ${pt>0?'+'+pt:'prono'}</span>`;}
    const mchip=r.mom?`<span class="m-mom">⭐ ${r.mom.name.split(' ').slice(-1)[0]}</span>`:'';
    foot=`<div class="m-foot"><span class="m-status fin">Terminé</span>${pchip}${mchip}${r.pen?`<span class="m-pen">tab ${fl(r.pen)}</span>`:''}${sl}</div>`;
  } else {
    const pchip=pr?`<span class="m-prono">🔮 ${pr.h}–${pr.a}</span>`:'';
    foot=`<div class="m-foot"><span class="m-status tbd">${m.ko&&!(H&&A)?'À venir':'À saisir'}</span>${pchip}</div>`;
  }
  return `<div class="match ${done?'done':''}${frc(H)||frc(A)?' fr':''}" onclick="openMatch(${m.n})">
    <div class="m-top">${phBadge}<span class="m-when">${when||''}</span></div>
    ${trow(H,m.h,hw,done&&aw,done?r.h:'')}
    ${trow(A,m.a,aw,done&&hw,done?r.a:'')}
    ${foot}
  </div>`;
}

function koCard(m){
  const[H,A]=koTeams(m);const r=res(m.n);const done=played(m.n);
  const cls=done?'done':(H&&A?'live':'');
  const row=(code,slot,oppScoreHi,me,opp)=>{
    const w=done&&me>opp, l=done&&me<opp;
    const penW=done&&me===opp&&r.pen&&r.pen===code;
    return `<div class="kside ${w||penW?'win':''} ${l||(done&&me===opp&&r.pen&&!penW)?'lose':''}${frc(code)}">
      <span class="kf">${code?fl(code):'·'}</span>
      <span class="${code?'ktn':'ph2'}">${code?name(code):slotLabel(slot,m.n)}</span>
      ${done?`<span class="ks">${me}</span>`:''}</div>`;
  };
  return `<div class="km ${cls}" onclick="openMatch(${m.n})">
    <div class="kn"><span>M${m.n}</span><span>${m.phase==='P3'?'3e place':PHL(m)}</span></div>
    ${row(H,m.h,0,done?r.h:0,done?r.a:0)}
    ${row(A,m.a,0,done?r.a:0,done?r.h:0)}
  </div>`;
}
function PHL(m){return dateLabel(m.date)||'';}

/* BUTEURS */
function allScorers(){
  const tally={};
  ALLM.forEach(m=>{const r=res(m.n);if(!r||!r.scorers)return;
    r.scorers.forEach(s=>{if(s.shootout||s.og)return;const key=s.name+'|'+(s.team||'');
      if(!tally[key])tally[key]={name:s.name,team:s.team,g:0};tally[key].g++;});});
  return Object.values(tally).sort((a,b)=>b.g-a.g||a.name.localeCompare(b.name));
}
function renderSco(){
  const list=allScorers();
  let h='<div class="view">';
  h+=`<div class="banner"><span>👟</span><div><b>Soulier d'or.</b> Le classement se remplit tout seul quand tu synchronises les vrais matchs, et tu peux aussi ajouter un buteur à la main depuis n'importe quel match.</div></div>`;
  if(!list.length){h+=`<div class="empty"><div class="ic">⚽</div><b>Pas encore de but</b>Saisis un score puis ajoute les buteurs, ou appuie sur Synchroniser.</div>`;}
  else{let rank=0,prev=null;
    h+='<div class="sco-grid">';
    list.forEach((s,i)=>{if(s.g!==prev){rank=i+1;prev=s.g;}
      const top=rank<=3?'top'+rank:'';
      h+=`<div class="scorer ${top}${frc(s.team)}"><div class="rk">${rank}</div>
        <div><div class="pn">${s.name}</div><div class="pt">${fl(s.team)} ${name(s.team)||'—'}</div></div>
        <div class="gl"><span class="gn">${s.g}</span>${rank===1?'<span class="boot">👟</span>':'<span class="boot" style="opacity:.4">⚽</span>'}</div></div>`;
    });
    h+='</div>';}
  h+='</div>';app.innerHTML=h;
}

/* ========== JEUX : quiz + le savais-tu ========== */
const QCODES=Object.keys(DB.teams);
function qrnd(a){return a[Math.floor(Math.random()*a.length)];}
function qshuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function qsample(arr,n,excl){const pool=arr.filter(x=>x!==excl);const out=[];
  while(out.length<n&&pool.length){out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);}return out;}
function makeQ(){
  const type=qrnd(['flag','country','capital','player','player']);
  if(type==='flag'){const c=qrnd(QCODES);const opts=qshuffle([c,...qsample(QCODES,3,c)]);
    return {prompt:`<div class="q-big">${fl(c)}</div><div class="q-ask">C'est le drapeau de quel pays ?</div>`,
      opts:opts.map(o=>({label:name(o),ok:o===c}))};}
  if(type==='country'){const c=qrnd(QCODES);const opts=qshuffle([c,...qsample(QCODES,3,c)]);
    return {prompt:`<div class="q-ask">Quel est le drapeau de…</div><div class="q-country">${name(c)}</div>`,
      opts:opts.map(o=>({label:fl(o),ok:o===c,big:true}))};}
  if(type==='capital'){const wc=QCODES.filter(c=>FACTS[c]&&FACTS[c].cap);const c=qrnd(wc);
    const opts=qshuffle([c,...qsample(wc,3,c)]);
    return {prompt:`<div class="q-cap">📍 ${FACTS[c].cap}</div><div class="q-ask">C'est la capitale de quel pays ?</div>`,
      opts:opts.map(o=>({label:name(o),ok:o===c}))};}
  const tw=QCODES.filter(c=>(PLAYERS[c]||[]).length>5);const c=qrnd(tw);const pl=qrnd(PLAYERS[c]);
  const opts=qshuffle([c,...qsample(tw,3,c)]);
  return {prompt:`<div class="q-player">⚽<br>${pl}</div><div class="q-ask">Il joue pour quel pays ?</div>`,
    opts:opts.map(o=>({label:fl(o)+' '+name(o),ok:o===c}))};
}
let quizS=null;
function startQuiz(){quizS={qs:Array.from({length:5},makeQ),i:0,score:0,answered:false,picked:-1,done:false};renderPlay();}
function quizAnswer(idx){if(quizS.answered)return;quizS.answered=true;quizS.picked=idx;
  if(quizS.qs[quizS.i].opts[idx].ok)quizS.score++;renderPlay();}
function quizNext(){if(quizS.i<4){quizS.i++;quizS.answered=false;quizS.picked=-1;}else{
  S.quiz.pts+=quizS.score;S.quiz.games++;S.quiz.best=Math.max(S.quiz.best||0,quizS.score);save();quizS.done=true;}
  renderPlay();}
function closeQuiz(){quizS=null;renderPlay();}
function quizHTML(){
  if(quizS.done){const s=quizS.score;
    const msg=s===5?'PARFAIT ! 🤩':s>=4?'Excellent ! 🔥':s>=3?'Bien joué ! 👍':s>=1?'Pas mal !':'Réessaie ! 💪';
    return `<div class="quiz-end">
      <div class="qe-emo">${s>=4?'🏆':s>=3?'🎉':'⚽'}</div>
      <div class="qe-score">${s}/5</div>
      <div class="qe-msg">${msg}</div>
      <div class="qe-pts">+${s} point${s>1?'s':''} ajoutés 🏆</div>
      <div class="qe-best">Record : ${S.quiz.best}/5 · ${S.quiz.games} parties</div>
      <div class="qe-actions"><button class="btn primary" onclick="startQuiz()">Rejouer</button>
      <button class="btn ghost" onclick="closeQuiz()">Retour</button></div></div>`;}
  const Q=quizS.qs[quizS.i];
  return `<div class="quiz">
    <div class="quiz-top"><span>Question ${quizS.i+1}/5</span><span>⭐ ${quizS.score}</span></div>

    <div class="quiz-card">${Q.prompt}</div>
    <div class="quiz-opts">
    ${Q.opts.map((o,idx)=>`<button class="q-opt ${o.big?'big':''} ${quizS.answered?(o.ok?'good':(idx===quizS.picked?'bad':'')):''}" ${quizS.answered?'disabled':''} onclick="quizAnswer(${idx})">${o.label}</button>`).join('')}
    </div>
    ${quizS.answered?`<button class="quiz-next" onclick="quizNext()">${quizS.i<4?'Question suivante →':'Voir mon score 🏆'}</button>`:'<div class="quiz-hint">Touche la bonne réponse</div>'}
  </div>`;
}

  box.classList.add('on');}
function pickMom(e,nm,team){if(e)e.preventDefault();cur.mom={name:nm,team};drawSheet();}
function clearMom(){cur.mom=null;drawSheet();}

/* ========== Partage image ========== */
function shareMatch(n){
  const m=byN[n];let H,A;if(!m.ko){H=m.h;A=m.a;}else{[H,A]=koTeams(m);}
  const r=res(n),pr=predOf(n);
  let big,label;
  if(played(n)){big=`${r.h} – ${r.a}`;label='RÉSULTAT';}
  else if(pr){big=`${pr.h} – ${pr.a}`;label='MON PRONOSTIC';}
  else{big='? – ?';label='À VENIR';}
  const cv=document.createElement('canvas');cv.width=1080;cv.height=1080;const x=cv.getContext('2d');
  x.fillStyle='#f4f8ff';x.fillRect(0,0,1080,1080);
  x.fillStyle='#0b4fd1';x.fillRect(0,0,360,20);x.fillStyle='#ffffff';x.fillRect(360,0,360,20);x.fillStyle='#ef3340';x.fillRect(720,0,360,20);
  x.textAlign='center';
  x.fillStyle='#0b53d0';x.font='800 70px sans-serif';x.fillText('LE PARCOURS',540,150);
  x.fillStyle='#5d6f8e';x.font='600 32px sans-serif';x.fillText('Mondial 2026 · Allez les Bleus 🇫🇷',540,205);
  x.font='130px sans-serif';x.fillText(fl(H),300,420);x.fillText(fl(A),780,420);
  x.fillStyle='#10213f';x.font='800 46px sans-serif';
  x.fillText(name(H),300,500);x.fillText(name(A),780,500);
  x.fillStyle='#8a6fd4';x.font='800 36px sans-serif';x.fillText(label,540,620);
  x.fillStyle='#0b53d0';x.font='900 160px sans-serif';x.fillText(big,540,770);
  x.fillStyle='#d99a00';x.font='800 46px sans-serif';x.fillText('🏆 '+totalPoints()+' points',540,890);
  x.font='130px sans-serif';x.fillText('🐓',540,1030);
  cv.toBlob(async(blob)=>{
    const file=new File([blob],'mon-parcours.png',{type:'image/png'});
    try{if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Le Parcours',text:`${name(H)} ${big} ${name(A)} — Le Parcours 🇫🇷`});return;}}catch(e){}
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mon-parcours.png';a.click();
    toast('Image enregistrée 📤');
  },'image/png');
}

function renderSt(){
  const done=ALLM.filter(m=>played(m.n));
  let goals=0,big={d:-1};done.forEach(m=>{const r=res(m.n);goals+=r.h+r.a;
    const diff=Math.abs(r.h-r.a);if(diff>big.d)big={d:diff,m,r};});
  const totalM=ALLM.length;const remain=totalM-done.length;
  const sc=allScorers();const top=sc[0];
  // team goals
  const tg={};done.forEach(m=>{const r=res(m.n);
    let H,A;if(!m.ko){H=m.h;A=m.a;}else{[H,A]=koTeams(m);}
    if(H){tg[H]=(tg[H]||0)+r.h;}if(A){tg[A]=(tg[A]||0)+r.a;}});
  const bestT=Object.entries(tg).sort((a,b)=>b[1]-a[1])[0];
  const avg=done.length?(goals/done.length).toFixed(2):'0';
  let h='<div class="view"><div class="grid2">';
  h+=stat(done.length,'Matchs joués');
  h+=stat(remain,'Matchs à venir');
  h+=stat(goals,'Buts marqués');
  h+=stat(avg,'Buts / match');
  h+='</div>';
  if(top)h+=`<div class="stat wide"><span class="big">👟</span><div><div class="v">${top.name}</div><div class="l">Meilleur buteur · ${top.g} but${top.g>1?'s':''} (${name(top.team)})</div></div></div>`;
  if(bestT)h+=`<div class="stat wide"><span class="big">${fl(bestT[0])}</span><div><div class="v">${name(bestT[0])}</div><div class="l">Meilleure attaque · ${bestT[1]} buts</div></div></div>`;
  if(big.m){const r=big.r;let H,A;if(!big.m.ko){H=big.m.h;A=big.m.a;}else{[H,A]=koTeams(big.m);}
    h+=`<div class="stat wide"><span class="big">💥</span><div><div class="v">${name(H)} ${r.h}–${r.a} ${name(A)}</div><div class="l">Plus large victoire</div></div></div>`;}
  // progress
  const pct=Math.round(done.length/totalM*100);
  h+=`<div class="stat wide"><span class="big">📊</span><div style="flex:1"><div class="v">${pct}%</div><div class="l">Tournoi parcouru · ${done.length}/${totalM} matchs</div></div></div>`;
  // pronostics
  const ps=predStats();const tp=totalPoints();
  h+=`<div class="stat wide pts"><span class="big">🏆</span><div style="flex:1"><div class="v">${tp} pt${tp>1?'s':''}</div><div class="l">${ps.made} pronostic${ps.made>1?'s':''} · ${ps.exact} score${ps.exact>1?'s':''} exact${ps.exact>1?'s':''} 🎯</div></div></div>`;
  // badges / défis
  const bl=badges();const got=bl.filter(b=>b.ok).length;
  h+=`<div class="eyebrow" style="margin-top:22px">🎖️ Mes défis · ${got}/${bl.length}</div><div class="badges">`;
  bl.forEach(b=>{h+=`<div class="badge ${b.ok?'on':''}"><span class="be">${b.e}</span><div class="bt">${b.t}</div><div class="bd">${b.ok?'Débloqué ✓':b.d}</div></div>`;});
  h+='</div>';
  h+=`<div class="tools">
      <button onclick="exportData()">⬇︎ Sauvegarder mes données</button>
      <button onclick="document.getElementById('imp').click()">⬆︎ Importer</button>
    </div><input type="file" id="imp" accept="application/json" style="display:none" onchange="importData(this)">
    <button class="tools" style="width:100%"><button onclick="resetAll()" style="width:100%;color:var(--loss);border-color:rgba(255,111,111,.25)">↺ Tout effacer</button></button>`;
  h+=`<div class="foot">Données live : TheSportsDB (FIFA World Cup).<br>Tout est stocké sur ton appareil. ${S.lastSync?'Dernière synchro : '+new Date(S.lastSync).toLocaleString('fr-FR'):'Jamais synchronisé.'}</div></div>`;
  app.innerHTML=h;
}
function stat(v,l){return `<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`;}

/* ---------- match entry sheet ---------- */
let cur=null;
function openMatch(n){
  const m=byN[n];let H,A;
  if(!m.ko){H=m.h;A=m.a;}else{[H,A]=koTeams(m);}
  if(m.ko&&!(H&&A)){toast('Affiche pas encore connue — finis les tours précédents.');return;}
  const r=res(n)||{h:null,a:null,scorers:[],pen:null};
  const pr=predOf(n)||{};
  cur={n,H,A,h:r.h??0,a:r.a??0,pen:r.pen||null,scorers:(r.scorers||[]).slice(),ph:pr.h??0,pa:pr.a??0,mom:r.mom||null};
  drawSheet();
  document.getElementById('scrim').classList.add('on');
}
function closeSheet(){document.getElementById('scrim').classList.remove('on');cur=null;}
function drawSheet(){
  const m=byN[cur.n];const isKO=m.ko;
  const when = isKO?`${PH[m.phase]} · M${m.n}${m.date?' · '+dateLabel(m.date):''}` : `Groupe ${m.grp} · Journée ${m.md}${m.date?' · '+dateLabel(m.date,m.time):''}`;
  let h=`<div class="grab"></div><div class="sh-when">${when}</div>`;
  const isDone=played(cur.n); const pr=predOf(cur.n);
  // pronostic block
  if(!isDone){
    h+=`<div class="prono">
      <div class="prono-h">🔮 Ton pronostic</div>
      <div class="prono-row">
        <span class="pf">${fl(cur.H)}</span>
        <div class="ministep"><button onclick="pbump('h',-1)">−</button><span class="pn">${cur.ph}</span><button onclick="pbump('h',1)">+</button></div>
        <span class="px">–</span>
        <div class="ministep"><button onclick="pbump('a',-1)">−</button><span class="pn">${cur.pa}</span><button onclick="pbump('a',1)">+</button></div>
        <span class="pf">${fl(cur.A)}</span>
      </div>
      <button class="prono-save" onclick="savePred()">${pr?'🔄 Modifier mon prono':'🔒 Valider mon prono'}</button>
      <div class="prono-hint">Score exact = <b>3 pts</b> · bon résultat = <b>1 pt</b></div>
    </div>`;
  } else if(pr){
    const pt=predPoints(cur.n);
    const msg=pt===3?'🎯 Score EXACT ! +3 points':pt===1?'👍 Bon résultat ! +1 point':'😅 Raté cette fois (+0)';
    h+=`<div class="prono done ${pt?'win':'lose'}"><div class="prono-h">🔮 Ton pronostic : <b>${pr.h}–${pr.a}</b></div><div class="prono-res">${msg}</div></div>`;
  }
  h+=`<div class="sec-t" style="margin-top:14px">⚽ ${isDone?'Le score':'Le score (quand le match est joué)'}</div>`;
  h+=`<div class="entry">
    <div class="eteam"><div class="ef">${fl(cur.H)}</div><div class="en">${name(cur.H)}</div></div>
    <div class="stepper"><button onclick="bump('h',-1)">−</button><div class="num">${cur.h}</div><button onclick="bump('h',1)">+</button></div>
    <span class="vs">VS</span>
    <div class="stepper"><button onclick="bump('a',-1)">−</button><div class="num">${cur.a}</div><button onclick="bump('a',1)">+</button></div>
    <div class="eteam"><div class="ef">${fl(cur.A)}</div><div class="en">${name(cur.A)}</div></div>
  </div>`;
  if(isKO && cur.h===cur.a){
    h+=`<div class="penbox"><div class="pt">Match nul → vainqueur aux tirs au but</div>
      <div class="penopts">
        <button class="${cur.pen===cur.H?'on':''}" onclick="setPen('${cur.H}')">${fl(cur.H)} ${name(cur.H)}</button>
        <button class="${cur.pen===cur.A?'on':''}" onclick="setPen('${cur.A}')">${fl(cur.A)} ${name(cur.A)}</button>
      </div></div>`;
  }
  // scorers
  h+=`<div class="sec-t">Buteurs</div><div class="sclist" id="sclist">`;
  if(!cur.scorers.length)h+=`<div style="color:var(--dim);font-size:12px;padding:4px 2px">Aucun buteur saisi.</div>`;
  cur.scorers.forEach((s,i)=>{
    const mk=(s.min?s.min+"'":'')+(s.og?' c.s.c.':'')+(s.pen?' s.p.':'');
    h+=`<div class="scrow"><span class="tm">${fl(s.team)}</span><span class="who">${s.name}</span>
      ${mk?`<span class="scmin">${mk}</span>`:''}<button class="del" onclick="delSc(${i})">✕</button></div>`;
  });
  h+=`</div>
    <div class="addsc">
      <div class="scfield">
        <input id="scName" placeholder="⚽ Tape un nom de buteur…" autocomplete="off" oninput="onScType()" onkeydown="scKey(event)" onfocus="onScType()">
        <div class="scsug" id="scSug"></div>
      </div>
    </div>
    <div class="addsc2">
      <input id="scMin" class="scmininput" placeholder="min'" inputmode="numeric" autocomplete="off">
      <select id="scTeam" onchange="onScType()"><option value="${cur.H}">${name(cur.H)}</option><option value="${cur.A}">${name(cur.A)}</option></select>
      <button class="addbtn" onclick="addSc()">Ajouter</button>
    </div>`;
  // homme du match
  h+=`<div class="sec-t">⭐ Homme du match</div>`;
  if(cur.mom){
    h+=`<div class="momrow"><span class="tm">${fl(cur.mom.team)}</span><span class="who">${cur.mom.name}</span><button class="del" onclick="clearMom()">✕</button></div>`;
  } else {
    h+=`<div class="addsc"><div class="scfield">
      <input id="momName" placeholder="⭐ Élis le meilleur joueur du match…" autocomplete="off" oninput="onMomType()" onfocus="onMomType()">
      <div class="scsug" id="momSug"></div></div></div>`;
  }
  h+=`<div class="sheet-actions">
    <button class="btn primary" onclick="saveMatch()">Enregistrer</button>
    <button class="btn share" onclick="shareMatch(${cur.n})">📤</button>
    ${played(cur.n)?'<button class="btn danger" onclick="clearMatch()">Effacer</button>':''}
    <button class="btn ghost" onclick="closeSheet()">Fermer</button></div>`;
  document.getElementById('sheet').innerHTML=h;
}
function bump(s,d){cur[s]=Math.max(0,Math.min(30,cur[s]+d));if(cur.h!==cur.a)cur.pen=null;drawSheet();}
function pbump(s,d){const k=s==='h'?'ph':'pa';cur[k]=Math.max(0,Math.min(30,cur[k]+d));drawSheet();}
function savePred(){if(!S.preds)S.preds={};
if(!S.quiz)S.quiz={pts:0,best:0,games:0};S.preds[cur.n]={h:cur.ph,a:cur.pa};save();toast('🔮 Pronostic validé !');drawSheet();}
function setPen(c){cur.pen=c;drawSheet();}
function norm(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').trim();}
function scPool(){ // players of both teams in current match, tagged with team
  const pool=[];
  [cur.H,cur.A].forEach(code=>{(PLAYERS[code]||[]).forEach(nm=>pool.push({nm,team:code}));});
  return pool;
}
function scMatch(q){
  const nq=norm(q); if(!nq)return [];
  const pool=scPool();
  const starts=[], contains=[];
  pool.forEach(p=>{
    const words=norm(p.nm).split(' ');
    if(words.some(w=>w.startsWith(nq))) starts.push(p);       // prénom OU nom commence par la saisie
    else if(norm(p.nm).includes(nq)) contains.push(p);
  });
  return starts.concat(contains).slice(0,8);
}
function onScType(){
  const inp=document.getElementById('scName'); const box=document.getElementById('scSug');
  if(!inp||!box)return;
  const list=scMatch(inp.value);
  if(!list.length){box.classList.remove('on');box.innerHTML='';return;}
  box.innerHTML=list.map(p=>`<button onmousedown="pickSc(event,'${p.nm.replace(/'/g,"\\'")}','${p.team}')"><span class="sf">${fl(p.team)}</span><span class="snm">${p.nm}</span><span class="stm">${name(p.team)}</span></button>`).join('');
  box.classList.add('on');
}
function pickSc(e,nm,team){ if(e)e.preventDefault();
  const mn=(document.getElementById('scMin')||{}).value||'';
  cur.scorers.push({name:nm,team,min:mn.trim(),src:'manual'}); drawSheet();
  setTimeout(()=>{const el=document.getElementById('scName');if(el)el.focus();},30);
}
function scKey(e){
  if(e.key==='Enter'){e.preventDefault();
    const list=scMatch(document.getElementById('scName').value);
    if(list.length)pickSc(null,list[0].nm,list[0].team); else addSc();
  }
}
function addSc(){const n=document.getElementById('scName').value.trim();if(!n)return;
  const tm=document.getElementById('scTeam').value;
  const mn=(document.getElementById('scMin')||{}).value||'';
  cur.scorers.push({name:n,team:tm,min:mn.trim(),src:'manual'});drawSheet();
  setTimeout(()=>{const el=document.getElementById('scName');if(el)el.focus();},30);}
function delSc(i){cur.scorers.splice(i,1);drawSheet();}
function confetti(){
  const box=document.getElementById('confetti');if(!box)return;
  const cols=['#0b4fd1','#ffffff','#ef3340','#0b4fd1','#ef3340','#f4b400'];
  box.innerHTML='';
  for(let i=0;i<90;i++){
    const p=document.createElement('div');p.className='cfp';
    p.style.left=Math.random()*100+'vw';
    p.style.background=cols[i%cols.length];
    p.style.animationDuration=(1.8+Math.random()*1.6)+'s';
    p.style.animationDelay=(Math.random()*.5)+'s';
    p.style.transform='scale('+(.6+Math.random()*.9)+')';
    box.appendChild(p);
  }
  box.classList.add('on');
  clearTimeout(box._t);box._t=setTimeout(()=>box.classList.remove('on'),3200);
}
function saveMatch(){
  const m=byN[cur.n]; const n=cur.n;
  if(m.ko&&cur.h===cur.a&&!cur.pen){toast('Choisis le vainqueur aux tirs au but.');return;}
  S.results[cur.n]={h:cur.h,a:cur.a,pen:(cur.h===cur.a?cur.pen:null),scorers:cur.scorers,mom:cur.mom||null};
  // France celebration
  let frWin=false;
  if(cur.H==='FRA'||cur.A==='FRA'){
    const frH=cur.H==='FRA';
    const mine=frH?cur.h:cur.a, opp=frH?cur.a:cur.h;
    if(mine>opp) frWin=true;
    else if(m.ko&&mine===opp&&cur.pen==='FRA') frWin=true;
  }
  save();
  const pt=predPoints(n);
  closeSheet();
  let msgs=[];
  if(frWin){confetti();msgs.push('🇫🇷 Allez les Bleus ! Victoire 🎉');}
  if(pt===3){confetti();msgs.push('🎯 Pronostic EXACT ! +3 pts');}
  else if(pt===1){msgs.push('👍 Bon pronostic ! +1 pt');}
  toast(msgs.length?msgs.join('  ·  '):'Résultat enregistré ✓');
  render();
}
function clearMatch(){delete S.results[cur.n];save();closeSheet();toast('Effacé');render();}

/* ---------- SYNC (live results + scorers) ---------- */
const API='https://www.thesportsdb.com/api/v1/json/3/';
const LEAGUE='4429';
const AL=DB.aliases;
function codeFromName(n){if(AL[n])return AL[n];
  // fuzzy: strip accents/punct
  const k=Object.keys(AL).find(x=>x.toLowerCase()===String(n).toLowerCase());return k?AL[k]:null;}
async function doSync(){
  const btn=document.getElementById('syncBtn');btn.classList.add('spin');
  const txt=document.getElementById('syncTxt');txt.textContent='Synchro…';
  const start=new Date('2026-06-11'); const today=new Date();
  const end=new Date(Math.min(today.getTime(), new Date('2026-07-19').getTime()));
  let dates=[];for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){dates.push(d.toISOString().slice(0,10));}
  let found=0,goalsAdded=0,errs=0;
  // map for fast group fixture lookup by unordered pair
  const pairIndex={};DB.group_fixtures.forEach(m=>{pairIndex[[m.h,m.a].sort().join('-')]=m.n;});
  for(let i=0;i<dates.length;i++){
    txt.textContent='Jour '+(i+1)+'/'+dates.length;
    let ev=[];
    try{const r=await fetch(API+'eventsday.php?d='+dates[i]+'&l='+LEAGUE);const j=await r.json();ev=j.events||[];}
    catch(e){errs++;continue;}
    for(const e of ev){
      if(e.intHomeScore==null||e.intHomeScore===''||e.strStatus==='NS'||e.strStatus==='')continue;
      const hc=codeFromName(e.strHomeTeam),ac=codeFromName(e.strAwayTeam);
      if(!hc||!ac)continue;
      let n=pairIndex[[hc,ac].sort().join('-')];
      // knockout: match by resolved current teams
      if(!n){const ko=DB.ko_fixtures.find(m=>{const[H,A]=koTeams(m);return H&&A&&((H===hc&&A===ac)||(H===ac&&A===hc));});if(ko)n=ko.n;}
      if(!n)continue;
      const m=byN[n];const homeIsH=(m.ko?koTeams(m)[0]:m.h)===hc;
      const hs=+e.intHomeScore, as=+e.intAwayScore;
      const prev=S.results[n]||{};const manualSc=(prev.scorers||[]).filter(s=>s.src!=='sync');
      // fetch scorers
      let syncSc=[];
      try{const tr=await fetch(API+'lookuptimeline.php?id='+e.idEvent);const tj=await tr.json();
        (tj.timeline||[]).forEach(t=>{if(t.strTimeline!=='Goal')return;
          const teamCode=(t.strHome==='Yes')?codeFromName(e.strHomeTeam):codeFromName(e.strAwayTeam);
          syncSc.push({name:t.strPlayer||'?',team:teamCode,min:t.intTime||null,src:'sync',
            shootout:(t.strTimelineDetail||'').toLowerCase().includes('shootout')});});
      }catch(e2){}
      goalsAdded+=syncSc.filter(s=>!s.shootout).length;
      // store oriented to our fixture's home/away
      const oH = homeIsH?hs:as, oA = homeIsH?as:hs;
      const pen = (oH===oA)? (codeFromName(e.strHomeTeam) /* fallback */):null;
      S.results[n]={h:oH,a:oA,pen:(prev.pen||(oH===oA?prev.pen:null)),scorers:[...manualSc,...syncSc]};
      found++;
    }
  }
  S.lastSync=Date.now();save();refreshTA();
  btn.classList.remove('spin');txt.textContent='Synchroniser';
  render();
  toast(found?`✓ ${found} matchs · ${goalsAdded} buts importés${errs?' ('+errs+' jours indispo)':''}`:'Aucun nouveau résultat pour l\'instant');
}
document.getElementById('syncBtn').addEventListener('click',doSync);

/* ---------- data tools ---------- */
function exportData(){const blob=new Blob([JSON.stringify(S)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='parcours2026-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Fichier de sauvegarde créé');}
function importData(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const j=JSON.parse(rd.result);if(j.results){S=j;save();render();toast('Données importées ✓');}else toast('Fichier non reconnu');}
  catch(e){toast('Fichier illisible');}};rd.readAsText(f);}
function resetAll(){if(confirm('Effacer tous les résultats et buteurs saisis ?')){S={results:{},preds:{},quiz:{pts:0,best:0,games:0},scorersExtra:{},lastSync:null};save();render();toast('Tout est remis à zéro');}}

/* ---------- nav ---------- */
document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t===b));
  view=b.dataset.v;window.scrollTo(0,0);render();});
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeSheet();});
render();
